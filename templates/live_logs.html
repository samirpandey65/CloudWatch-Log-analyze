<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Logs - CloudWatch Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', Arial, sans-serif; 
            background: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #252526;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            color: #fff;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .controls input, .controls select {
            padding: 8px 12px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 13px;
        }
        .btn {
            padding: 8px 16px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .btn:hover { background: #1177bb; }
        .btn-stop { background: #d32f2f; }
        .btn-stop:hover { background: #f44336; }
        .btn-clear { background: #616161; }
        .btn-clear:hover { background: #757575; }
        .status-bar {
            background: #007acc;
            color: white;
            padding: 8px 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .status-bar.stopped { background: #d32f2f; }
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .log-entry {
            padding: 6px 10px;
            border-left: 3px solid transparent;
            margin-bottom: 2px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-entry:hover {
            background: #2d2d30;
        }
        .log-entry.error {
            border-left-color: #f48771;
            background: rgba(244, 135, 113, 0.1);
        }
        .log-entry.warning {
            border-left-color: #cca700;
            background: rgba(204, 167, 0, 0.1);
        }
        .log-entry.info {
            border-left-color: #75beff;
            background: rgba(117, 190, 255, 0.05);
        }
        .log-entry.attack {
            border-left-color: #ff5252;
            background: rgba(255, 82, 82, 0.15);
            font-weight: 600;
        }
        .log-timestamp {
            color: #858585;
            margin-right: 10px;
        }
        .log-stream {
            color: #4ec9b0;
            margin-right: 10px;
        }
        .log-message {
            color: #d4d4d4;
        }
        .attack-badge {
            background: #ff5252;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 10px;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #858585;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .filter-bar {
            background: #252526;
            padding: 10px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .filter-bar input {
            flex: 1;
            padding: 6px 10px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 12px;
        }
        .filter-bar select {
            padding: 6px 10px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-radius: 4px;
            color: #d4d4d4;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔴 Live CloudWatch Logs</h1>
        <div class="controls">
            <input type="text" id="logGroup" placeholder="Log Group Name" style="width: 300px;">
            <select id="region">
                <option value="us-east-1">us-east-1</option>
                <option value="us-east-2">us-east-2</option>
                <option value="us-west-1">us-west-1</option>
                <option value="us-west-2" selected>us-west-2</option>
                <option value="eu-west-1">eu-west-1</option>
                <option value="eu-central-1">eu-central-1</option>
            </select>
            <button class="btn" id="startBtn" onclick="startStreaming()">▶ Start</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopStreaming()" style="display:none;">⏹ Stop</button>
            <button class="btn btn-clear" onclick="clearLogs()">🗑 Clear</button>
            <a href="/live-monitor" class="btn" style="text-decoration:none;">⚙️ Monitors</a>
        </div>
    </div>

    <div class="status-bar" id="statusBar">
        <div>Status: <span id="status">Stopped</span></div>
        <div class="stats">
            <div class="stat-item">📊 Total: <span id="totalLogs">0</span></div>
            <div class="stat-item">🚨 Threats: <span id="threatCount">0</span></div>
            <div class="stat-item">⏱ Last: <span id="lastUpdate">Never</span></div>
        </div>
    </div>

    <div class="filter-bar">
        <input type="text" id="filterText" placeholder="Filter logs..." onkeyup="filterLogs()">
        <select id="filterType" onchange="filterLogs()">
            <option value="all">All Logs</option>
            <option value="attack">Threats Only</option>
            <option value="error">Errors Only</option>
            <option value="warning">Warnings Only</option>
        </select>
        <button class="btn" onclick="scrollToBottom()">⬇ Bottom</button>
    </div>

    <div class="log-container" id="logContainer">
        <div class="empty-state">
            <h3>No logs yet</h3>
            <p>Enter a log group name and click Start to begin streaming</p>
        </div>
    </div>

    <script>
        let streaming = false;
        let eventSource = null;
        let totalLogs = 0;
        let threatCount = 0;
        let allLogs = [];

        function startStreaming() {
            const logGroup = document.getElementById('logGroup').value.trim();
            const region = document.getElementById('region').value;

            if (!logGroup) {
                alert('Please enter a log group name');
                return;
            }

            streaming = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('status').textContent = 'Streaming...';
            document.getElementById('statusBar').classList.remove('stopped');
            document.getElementById('logContainer').innerHTML = '';

            // Start SSE connection
            eventSource = new EventSource(`/api/stream-logs?log_group=${encodeURIComponent(logGroup)}&region=${region}`);

            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.status === 'log') {
                    addLogEntry(data);
                } else if (data.status === 'error') {
                    console.error('Stream error:', data.message);
                    stopStreaming();
                    alert('Error: ' + data.message);
                }
            };

            eventSource.onerror = function() {
                console.error('SSE connection error');
                stopStreaming();
            };
        }

        function stopStreaming() {
            streaming = false;
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('status').textContent = 'Stopped';
            document.getElementById('statusBar').classList.add('stopped');
        }

        function addLogEntry(data) {
            totalLogs++;
            const logEntry = {
                timestamp: data.timestamp,
                stream: data.stream,
                message: data.message,
                type: data.log_type || 'info',
                isAttack: data.is_attack || false,
                attackType: data.attack_type || null
            };
            
            allLogs.push(logEntry);
            if (allLogs.length > 1000) allLogs.shift(); // Keep last 1000

            if (logEntry.isAttack) threatCount++;

            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${logEntry.type}${logEntry.isAttack ? ' attack' : ''}`;
            
            const time = new Date(logEntry.timestamp).toLocaleTimeString();
            entry.innerHTML = `
                <span class="log-timestamp">${time}</span>
                <span class="log-stream">${logEntry.stream}</span>
                <span class="log-message">${escapeHtml(logEntry.message)}</span>
                ${logEntry.isAttack ? `<span class="attack-badge">🚨 ${logEntry.attackType}</span>` : ''}
            `;
            
            container.appendChild(entry);

            // Auto-scroll if near bottom
            if (container.scrollHeight - container.scrollTop - container.clientHeight < 100) {
                container.scrollTop = container.scrollHeight;
            }

            // Update stats
            document.getElementById('totalLogs').textContent = totalLogs;
            document.getElementById('threatCount').textContent = threatCount;
            document.getElementById('lastUpdate').textContent = time;
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            allLogs = [];
            totalLogs = 0;
            threatCount = 0;
            document.getElementById('totalLogs').textContent = '0';
            document.getElementById('threatCount').textContent = '0';
        }

        function filterLogs() {
            const filterText = document.getElementById('filterText').value.toLowerCase();
            const filterType = document.getElementById('filterType').value;
            
            const container = document.getElementById('logContainer');
            container.innerHTML = '';

            let filtered = allLogs;

            if (filterType !== 'all') {
                filtered = filtered.filter(log => {
                    if (filterType === 'attack') return log.isAttack;
                    return log.type === filterType;
                });
            }

            if (filterText) {
                filtered = filtered.filter(log => 
                    log.message.toLowerCase().includes(filterText) ||
                    log.stream.toLowerCase().includes(filterText)
                );
            }

            filtered.forEach(log => {
                const entry = document.createElement('div');
                entry.className = `log-entry ${log.type}${log.isAttack ? ' attack' : ''}`;
                const time = new Date(log.timestamp).toLocaleTimeString();
                entry.innerHTML = `
                    <span class="log-timestamp">${time}</span>
                    <span class="log-stream">${log.stream}</span>
                    <span class="log-message">${escapeHtml(log.message)}</span>
                    ${log.isAttack ? `<span class="attack-badge">🚨 ${log.attackType}</span>` : ''}
                `;
                container.appendChild(entry);
            });
        }

        function scrollToBottom() {
            const container = document.getElementById('logContainer');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onbeforeunload = function() {
            if (streaming) {
                stopStreaming();
            }
        };
    </script>
</body>
</html>
